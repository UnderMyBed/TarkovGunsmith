name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  data-proxy:
    name: Deploy data-proxy Worker
    # Release-please PRs only touch CHANGELOG.md + package.json version — app code
    # is identical to the previous (already-deployed) feature merge. Skip to avoid
    # double-deploying every release cycle.
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(main): release') }}"
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-data-proxy
      cancel-in-progress: false
    environment:
      name: production-data-proxy
      url: https://tarkov-gunsmith-data-proxy.workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (verify bundle)
        run: pnpm --filter @tarkov/data-proxy build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/data-proxy
          command: deploy

  builds-api:
    name: Deploy builds-api Worker
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(main): release') }}"
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-builds-api
      cancel-in-progress: false
    environment:
      name: production-builds-api
      url: https://tarkov-gunsmith-builds-api.workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (verify bundle)
        run: pnpm --filter @tarkov/builds-api build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/builds-api
          command: deploy

  pages:
    name: Deploy web (Cloudflare Pages)
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(main): release') }}"
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-pages
      cancel-in-progress: false
    environment:
      name: production-pages
      url: https://tarkov-gunsmith-web.pages.dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SPA (and its workspace deps)
        # ...build = include the workspace packages @tarkov/web depends on
        # (@tarkov/data, @tarkov/ui, @tarkov/types). Without this, vite/tsc
        # can't resolve the workspace imports because their dist/ is missing.
        run: pnpm --filter "@tarkov/web..." build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy ./dist --project-name=tarkov-gunsmith-web --branch=main
