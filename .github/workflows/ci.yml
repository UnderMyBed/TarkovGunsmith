name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to run CI against (branch or SHA)"
        required: false
        default: "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck • Lint • Format • Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        # Catches build-only failures that typecheck/lint miss (e.g. missing
        # devDependencies that vite or tsc resolve only at bundle time).
        run: pnpm build

      # Playwright's Chromium tarball is ~130MB. Cache it keyed to the
      # resolved @playwright/test version so we only re-download when the
      # package updates. System deps (apt packages) are fast and can
      # always reinstall from APT on the runner.
      - name: Resolve Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('./apps/web/package.json').devDependencies['@playwright/test'].replace(/^[\^~]/,'')")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers (cache miss only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @tarkov/web test:e2e:install

      - name: Install Playwright system deps (cache hit — apt only)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @tarkov/web exec playwright install-deps chromium

      - name: E2E smoke tests
        run: pnpm --filter @tarkov/web test:e2e

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: apps/web/test-results/
          retention-days: 7
