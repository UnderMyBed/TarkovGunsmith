name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to run CI against (branch or SHA)"
        required: false
        default: "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck • Lint • Format • Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        # Catches build-only failures that typecheck/lint miss (e.g. missing
        # devDependencies that vite or tsc resolve only at bundle time).
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @tarkov/web test:e2e:install

      - name: E2E smoke tests
        run: pnpm --filter @tarkov/web test:e2e

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: apps/web/test-results/
          retention-days: 7
